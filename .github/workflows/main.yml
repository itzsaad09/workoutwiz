on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, develop]

name: "WorkoutWiz CI/CD"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # --- ENVIRONMENT SETUP ---
      - name: Create .env file
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "API_KEY=${API_KEY}" >> .env

      - name: Get Dependencies
        run: flutter pub get

      - name: Clean Build
        run: flutter clean

      # --- QUALITY CHECK ---
      - name: Analyze Project
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      # --- BUILD COMMANDS ---
      - name: Build Android APK
        run: |
          # Build fat APK (all ABIs)
          flutter build apk --release

          # Rename for easy identification
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/WorkoutWiz-v1.0.${{ github.run_number }}.apk

      # --- RELEASE ---
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/WorkoutWiz-*.apk"
          tag: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- CLEANUP ---
      - name: Clean up sensitive files
        run: |
          rm -f .env
